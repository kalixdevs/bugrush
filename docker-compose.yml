services:
  postgres:
    image: postgres:16-alpine
    container_name: devrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devrace
      POSTGRES_USER: devrace
      POSTGRES_PASSWORD: devrace
    ports:
      - "5432:5432"
    volumes:
      - devrace-pgdata:/var/lib/postgresql/data

volumes:
  devrace-pgdata:
